name: Release Windows
on:
  workflow_dispatch:
    inputs:
      no-cache:
        description: '캐시 없이 빌드'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'resources/**'
      - 'tsconfig.json'
permissions:
  contents: write
jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache NAPS2
        if: ${{ inputs.no-cache != true }}
        uses: actions/cache@v4
        with:
          path: resources/naps2
          key: naps2-${{ hashFiles('scripts/download-naps2.mjs') }}

      - name: Cache Electron binary
        if: ${{ inputs.no-cache != true }}
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-bin-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-bin-${{ runner.os }}-

      - name: Cache electron-builder
        if: ${{ inputs.no-cache != true }}
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Cache Next.js build
        if: ${{ inputs.no-cache != true }}
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'components/**', 'features/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Generate version and tag
        id: tag
        shell: bash
        run: |
          DATE_TAG="$(date +'%Y-%m-%d')"
          MONTH=$(date +'%-m')
          DAY=$(date +'%-d')
          YEAR=$(date +'%Y')
          MMDD=$(printf '%02d%02d' "$MONTH" "$DAY")

          # 같은 날 여러 빌드 시 suffix 추가 (semver에서 leading zero 제거됨)
          MMDD_NUM=$((MONTH * 100 + DAY))
          COUNT=$(gh release list --limit 100 | grep -c "${YEAR}\.${MMDD_NUM}\." || true)
          if [ "$COUNT" -gt "0" ]; then
            FILE_TAG="${DATE_TAG}-${COUNT}"
            SEMVER="${YEAR}.${MMDD}.${COUNT}"
          else
            FILE_TAG="${DATE_TAG}"
            SEMVER="${YEAR}.${MMDD}.0"
          fi

          echo "tag=$FILE_TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm ci
      - name: Set version in package.json
        shell: bash
        run: npm version ${{ steps.tag.outputs.semver }} --no-git-tag-version --allow-same-version
      - name: Download NAPS2 & Build (parallel)
        shell: bash
        run: |
          npm run naps2:download &
          NAPS2_PID=$!
          npx next build
          npm run electron:compile
          wait $NAPS2_PID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.tag.outputs.tag }}
      - name: Create git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.tag.outputs.semver }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and publish
        shell: bash
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.tag.outputs.tag }}
